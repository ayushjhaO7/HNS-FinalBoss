[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:rust-bridge]
command=/app/rust-ingestor
autostart=true
autorestart=true
stderr_logfile=/var/log/rust-bridge.err.log
stdout_logfile=/var/log/rust-bridge.out.log
environment=MQTT_BROKER="broker.hivemq.com",MQTT_PORT="1883",MQTT_TOPIC="coldchain/telemetry/#",DATA_DIR="/app/shared/data"

[program:spark-worker]
command=python3 /app/ingestion/ingestion.py
autostart=true
autorestart=true
stderr_logfile=/var/log/spark-worker.err.log
stdout_logfile=/var/log/spark-worker.out.log
environment=DATA_DIR="/app/shared/data"

[program:shiny-dashboard]
command=R -e "shiny::runApp('/app/analytics', port=3838, host='0.0.0.0')"
autostart=true
autorestart=true
stderr_logfile=/var/log/shiny-dashboard.err.log
stdout_logfile=/var/log/shiny-dashboard.out.log
directory=/app/analytics
