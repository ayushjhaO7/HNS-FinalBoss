# =============================================================================
#  Eclipse Mosquitto MQTT Broker Configuration
#  Cold-Chain Logistics Tracker — Unit 5 (DevOps)
# =============================================================================
#
#  This configuration allows anonymous connections (suitable for development
#  and Wokwi simulation). For production, enable authentication.
#
# =============================================================================

# --- Listener Configuration ---
# Default MQTT listener on port 1883
listener 1883
protocol mqtt

# WebSocket listener on port 9001 (useful for debugging with MQTT.js)
listener 9001
protocol websockets

# --- Security ---
# Allow anonymous connections (no username/password required)
# For production: set to false and configure password_file
allow_anonymous true

# --- Persistence ---
# Enable message persistence so QoS 1/2 messages survive broker restarts
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
# Log to stdout so Docker can capture logs via `docker logs`
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Log timestamps
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Connection Limits ---
max_connections -1
max_queued_messages 1000

# --- Keep Alive ---
max_keepalive 120
